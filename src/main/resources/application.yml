server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:ecorun}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

            scope:
              - profile
              - email

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration-time: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

  api-docs:
    path: /v3/api-docs

gemini:
  api:
    key: ${GEMINI_API_KEY}