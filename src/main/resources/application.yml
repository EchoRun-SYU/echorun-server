spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  swagger-ui:
    # Swagger 접속 경로를 더 짧게 만들어줍니다. (기본값은 /swagger-ui/index.html)
    path: /swagger-ui.html
    # API가 만들어진 순서대로(컨트롤러에 적힌 순서대로) 화면에 정렬해줍니다.
    operations-sorter: alpha